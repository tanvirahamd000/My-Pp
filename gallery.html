<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Hind Siliguri',sans-serif;
}

body{
background:#eef5ff;
}

nav{
background:#0d6efd;
padding:15px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:15px;
font-size:18px;
font-weight:bold;
}

.container{
width:90%;
max-width:1000px;
margin:30px auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 20px rgba(0,0,0,.1);
}

.card h2{
color:#0d6efd;
margin-bottom:20px;
text-align:center;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.05);
}

footer{
background:#0d6efd;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

</style>

</head>
